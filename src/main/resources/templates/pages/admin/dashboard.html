<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/app}"
>
  <head th:replace="~{fragments/header :: header('Beranda')}"></head>
  <body>
    <div layout:fragment="content">
      <!-- Small Box (Stat card) -->

      <div class="row">
        <h5 class="mb-2 mt-4">Managemen Tugas</h5>
        <div class="col-lg-3 col-6">
          <!-- small card -->
          <div class="small-box bg-info">
            <div class="inner">
              <h3>150</h3>

              <p>Skema</p>
            </div>
            <div class="icon">
              <i class="fas fa-th-list"></i>
            </div>
            <a th:href="@{/admin/skema}" class="small-box-footer">
              Lihat Selengkapnya <i class="fas fa-arrow-circle-right"></i>
            </a>
          </div>
        </div>
        <div class="col-lg-3 col-6">
          <!-- small card -->
          <div class="small-box bg-info">
            <div class="inner">
              <h3>150</h3>

              <p>TUK</p>
            </div>
            <div class="icon">
              <i class="fas fa-building"></i>
            </div>
            <a th:href="@{/admin/tuk}" class="small-box-footer">
              Lihat Selengkapnya <i class="fas fa-arrow-circle-right"></i>
            </a>
          </div>
        </div>
        <div class="col-lg-3 col-6">
          <!-- small card -->
          <div class="small-box bg-info">
            <div class="inner">
              <h3>150</h3>

              <p>Jadwal Sertifikasi</p>
            </div>
            <div class="icon">
              <i class="fas fa-calendar-plus"></i>
            </div>
            <a th:href="@{/admin/jadwal-sertifikasi}" class="small-box-footer">
              Lihat Selengkapnya <i class="fas fa-arrow-circle-right"></i>
            </a>
          </div>
        </div>
        <div class="col-lg-3 col-6">
          <!-- small card -->
          <div class="small-box bg-info">
            <div class="inner">
              <h3>150</h3>

              <p>Surat Tugas</p>
            </div>
            <div class="icon">
              <i class="fas fa-file-alt"></i>
            </div>
            <a th:href="@{/admin/surat-tugas-asesor}" class="small-box-footer">
              Lihat Selengkapnya <i class="fas fa-arrow-circle-right"></i>
            </a>
          </div>
        </div>
      </div>

      <div class="row">
        <h5 class="mb-2 mt-4">Managemen Users</h5>
        <div class="col-lg-3 col-6">
          <!-- small card -->
          <div class="small-box bg-info">
            <div class="inner">
              <h3>150</h3>

              <p>Data Pengguna</p>
            </div>
            <div class="icon">
              <i class="fas fa-users-cog"></i>
            </div>
            <a th:href="@{/admin/data-pengguna}" class="small-box-footer">
              Lihat Selengkapnya <i class="fas fa-arrow-circle-right"></i>
            </a>
          </div>
        </div>
        <div class="col-lg-3 col-6">
          <!-- small card -->
          <div class="small-box bg-info">
            <div class="inner">
              <h3>150</h3>

              <p>Data Asesi</p>
            </div>
            <div class="icon">
              <i class="fas fa-users"></i>
            </div>
            <a th:href="@{/admin/data-asesi}" class="small-box-footer">
              Lihat Selengkapnya <i class="fas fa-arrow-circle-right"></i>
            </a>
          </div>
        </div>
        <div class="col-lg-3 col-6">
          <!-- small card -->
          <div class="small-box bg-info">
            <div class="inner">
              <h3>150</h3>

              <p>Data Asesor</p>
            </div>
            <div class="icon">
              <i class="fas fa-user-tie"></i>
            </div>
            <a th:href="@{/admin/data-asesor}" class="small-box-footer">
              Lihat Selengkapnya <i class="fas fa-arrow-circle-right"></i>
            </a>
          </div>
        </div>
        
      </div>
    </div>
  </body>
</html>
