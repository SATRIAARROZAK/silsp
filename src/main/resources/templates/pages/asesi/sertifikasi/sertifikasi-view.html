                      </div>
                      <div class="col-md-6">

                          <label>Jadwal Kegiatan</label>

                            disabled
                          />
                        </div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Sumber Anggaran</label>
                          <input
                            type="text"
                            class="form-control"
                            th:value="${permohonan.sumberAnggaran != null ? permohonan.sumberAnggaran.name : '-'}"
